# CANONICAL copy of chartroom-site's Pages workflow. chartroom-site publishes
# via GitHub Pages workflow builds (build_type=workflow, set during the
# chartroom.thrain.ai HTTPS fix) — this file IS the publishing mechanism there.
#
# Every snapshot force-pushed to chartroom-site MUST include this file at
# .github/workflows/deploy.yml, or Pages deploys stop and the live site
# silently freezes. All three publish paths (deploy.yml, refresh-data.yml,
# tools/deploy-site.sh) copy it into the snapshot — edit it only here.
name: deploy-pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
